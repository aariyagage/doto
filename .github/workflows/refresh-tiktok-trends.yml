name: Refresh TikTok trends

on:
  # Schedule disabled — trends feature is parked on the feature/trends branch
  # while we figure out a non-Reddit data source. Re-enable by uncommenting
  # the schedule block below; manual triggers (workflow_dispatch) still work.
  #
  # schedule:
  #   - cron: '0 5 * * *'
  workflow_dispatch:

# Only one refresh in flight at a time. Cancel an older run if a new one fires.
concurrency:
  group: refresh-tiktok-trends
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    # TikTok ~30s + Reddit ~3min (28 subs × 6.5s throttle) + buffer.
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Only install what the script needs. The full app dep set isn't required
      # here, but `npm ci` is the simplest/most reproducible option.
      - run: npm ci

      # Chromium binary for Playwright. ~150MB — runs in seconds on a GH runner.
      - run: npx playwright install --with-deps chromium

      - run: npx tsx scripts/refresh-trends.ts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          # Reddit OAuth — required because Reddit returns 403 to unauthenticated
          # requests from datacenter IPs (GitHub Actions). If unset, the Reddit
          # section of the cron is skipped and the run still succeeds with TikTok
          # data only.
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
